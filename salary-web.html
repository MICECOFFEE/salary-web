<!DOCTYPE html>
<html lang="ja">
<head>

<title>給与計算 | 100g COFFEE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#F5F3EE;--surface:#FFFFFF;--surface2:#EFECE5;--border:#DDD8CC;
  --text:#1A1814;--text2:#5C5648;--text3:#9A9080;
  --green:#2A5C2E;--green-l:#4A8C4D;--green-bg:#EBF3EB;
  --red:#B03020;--red-bg:#FAECEA;
  --amber:#9A6A10;--amber-bg:#FDF3DC;
  --blue:#1A3F80;--blue-bg:#EBF0F8;
  --shadow:0 2px 8px rgba(26,24,20,.07);
  --r:10px;--r2:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:200px;background:var(--text);color:#fff;display:flex;flex-direction:column;flex-shrink:0;}
.logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1);}
.logo h1{font-size:12px;font-weight:700;line-height:1.6;color:#fff;}
.logo p{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;}
.nav{flex:1;padding:6px 0;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.6);transition:.15s;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:rgba(255,255,255,.11);color:#fff;border-left-color:#4A8C4D;}
.nav-icon{font-size:14px;width:18px;text-align:center;}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;}
.content{padding:22px;flex:1;}

/* Auth */
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
.auth-card{background:var(--surface);border-radius:var(--r2);border:1px solid var(--border);padding:36px 32px;width:340px;box-shadow:var(--shadow);}
.auth-card h2{font-size:18px;font-weight:700;margin-bottom:4px;}
.auth-card p{font-size:12px;color:var(--text3);margin-bottom:24px;}
.auth-err{background:var(--red-bg);color:var(--red);padding:9px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none;}

/* Cards */
.card{background:var(--surface);border-radius:var(--r2);border:1px solid var(--border);padding:18px;margin-bottom:14px;}
.card-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* Stat */
.stat-card{background:var(--surface);border-radius:var(--r2);border:1px solid var(--border);padding:14px 18px;}
.stat-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.stat-value{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px;}

/* Form */
.form-group{margin-bottom:12px;}
.form-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;display:block;}
.form-control{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--surface);color:var(--text);font-family:inherit;}
.form-control:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 2px var(--green-bg);}
textarea.form-control{resize:vertical;min-height:60px;}

/* Buttons */
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--green);color:#fff;}.btn-primary:hover{background:var(--green-l);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);}.btn-outline:hover{background:var(--surface2);}
.btn-red{background:var(--red);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-lg{padding:10px 20px;font-size:13px;}
.btn-group{display:flex;gap:7px;flex-wrap:wrap;}

/* Table */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--surface2);padding:7px 9px;text-align:left;font-size:10px;font-weight:700;color:var(--text2);white-space:nowrap;border-bottom:1px solid var(--border);}
td{padding:7px 9px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
tfoot td{background:var(--surface2) !important;font-weight:700;}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:600;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-blue{background:var(--blue-bg);color:var(--blue);}
.badge-gray{background:var(--surface2);color:var(--text3);}

/* Alert */
.alert{padding:9px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;}
.alert-info{background:var(--blue-bg);color:var(--blue);}
.alert-warn{background:var(--amber-bg);color:var(--amber);}
.alert-success{background:var(--green-bg);color:var(--green);}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--surface);border-radius:var(--r2);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:14px;font-weight:700;}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);}
.modal-body{padding:20px;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end;}

/* Misc */
.divider{height:1px;background:var(--border);margin:12px 0;}
.muted{color:var(--text3);font-size:11px;}
.tr{text-align:right;}
.bold{font-weight:700;}
.flex{display:flex;}.items-c{align-items:center;}.gap8{gap:8px;}.ml-a{margin-left:auto;}
.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);font-size:13px;gap:8px;}
.spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Editable input */
.edit-input{border:1px solid transparent;border-radius:6px;padding:3px 6px;background:transparent;font-family:'DM Mono',monospace;font-size:12px;width:100%;text-align:right;}
.edit-input:hover{border-color:var(--border);}
.edit-input:focus{outline:none;border-color:var(--green);background:var(--green-bg);}

/* Training badge */
.badge-training{background:#F0E6FA;color:#6B2FA0;}

/* Print */

  .app{display:block;height:auto;}
  .sidebar,.topbar,.no-print{display:none!important;}
  .main{overflow:visible;}
  .content{padding:0;}
  body{background:#fff;font-size:11px;}
  @page{size:A4;margin:15mm;}
}
</style>

<!-- Firebase -->
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import{getAuth,signInWithEmailAndPassword,signOut,onAuthStateChanged,GoogleAuthProvider,signInWithPopup}from'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';
import{getFirestore,doc,getDoc,setDoc}from'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

const FB={apiKey:"AIzaSyCNxDr8wqq-dIfI7ns9mZ6GySQkP0qAN1I",authDomain:"shift-app-920a1.firebaseapp.com",projectId:"shift-app-920a1",storageBucket:"shift-app-920a1.firebasestorage.app",messagingSenderId:"393055910720",appId:"1:393055910720:web:97b30c30b3f3b85ba758a5"};
const app=initializeApp(FB);
const auth=getAuth(app);
const db=getFirestore(app);

/* ---- STATE ---- */
let uid=null;
let salaryDb=defaultSalaryDb();
let shiftData=null; // シフト管理からのデータキャッシュ
let currentPage='dashboard';

function defaultSalaryDb(){
  return{
    company:{name:'株式会社 100g COFFEE',postal:'',address:'',tel:'',email:'',bank:'',invoiceNo:''},
    staffSettings:{},
    records:[],
    monthlyExtras:[],
    nextId:1
  };
}

/* ---- AUTH ---- */
onAuthStateChanged(auth,u=>{
  if(u){
    uid=u.uid;
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app-screen').style.display='flex';
    document.getElementById('user-email-label').textContent=u.email;
    loadSalaryData();
  }else{
    uid=null;
    document.getElementById('auth-screen').style.display='flex';
    document.getElementById('app-screen').style.display='none';
  }
});

document.getElementById('google-login-btn').addEventListener('click',async()=>{
  const err=document.getElementById('auth-err');
  err.style.display='none';
  try{
    const provider=new GoogleAuthProvider();
    await signInWithPopup(auth,provider);
  }catch(e){err.textContent='Googleログイン失敗: '+e.message;err.style.display='block';}
});
document.getElementById('login-btn').addEventListener('click',async()=>{
  const email=document.getElementById('auth-email').value.trim();
  const pass=document.getElementById('auth-pass').value;
  const err=document.getElementById('auth-err');
  err.style.display='none';
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){err.textContent='ログインできません: '+e.message;err.style.display='block';}
});
document.getElementById('logout-btn').addEventListener('click',()=>signOut(auth));

/* ---- FIRESTORE ---- */
async function loadSalaryData(){
  try{
    const ref=doc(db,`salary_users/${uid}/data/main`);
    const snap=await getDoc(ref);
    if(snap.exists()){
      const d=snap.data();
      salaryDb=Object.assign(defaultSalaryDb(),d);
      if(!salaryDb.company)salaryDb.company={};
      if(!salaryDb.staffSettings)salaryDb.staffSettings={};
      if(!salaryDb.records)salaryDb.records=[];
      if(!salaryDb.monthlyExtras)salaryDb.monthlyExtras=[];
    }
  }catch(e){console.error(e);}
  showPage('dashboard');
}

async function saveSalaryData(){
  if(!uid)return;
  try{
    await setDoc(doc(db,`salary_users/${uid}/data/main`),JSON.parse(JSON.stringify(salaryDb)));
    showToast('Firestoreに保存しました');
  }catch(e){showToast('保存失敗: '+e.message,true);}
}

// シフト管理からデータ取得
async function loadShiftData(){
  if(!uid)return null;
  try{
    const snap=await getDoc(doc(db,`users/${uid}/data/main`));
    if(snap.exists()){shiftData=snap.data();return shiftData;}
  }catch(e){console.error(e);}
  return null;
}

// 収支分析へ給与データ連携
async function exportToProfit(month){
  if(!uid)return;
  const recs=salaryDb.records.filter(r=>r.month===month);
  if(!recs.length){alert('データがありません');return;}
  const totalPay=recs.reduce((s,r)=>s+getTotalPay(r),0);
  const totalTr=recs.reduce((s,r)=>s+(Number(r.transport)||0),0);
  const total=totalPay+totalTr;

  try{
    const profRef=doc(db,`profit_users/${uid}/data/main`);
    const snap=await getDoc(profRef);
    let profDb=snap.exists()?snap.data():{expenses:[],revenues:[],nextId:1};
    if(!profDb.expenses)profDb.expenses=[];
    if(!profDb.nextId)profDb.nextId=1;

    // 既存の同月給与エントリを削除
    profDb.expenses=profDb.expenses.filter(e=>!(e.category==='人件費'&&e.month===month));

    // スタッフ別に追加
    const staffList=[...new Set(recs.map(r=>r.staffName))];
    staffList.forEach(name=>{
      const sr=recs.filter(r=>r.staffName===name);
      const pay=sr.reduce((s,r)=>s+getEffectivePay(r),0);
      const tr=sr.reduce((s,r)=>s+(Number(r.transport)||0),0);
      profDb.expenses.push({
        id:profDb.nextId++,
        month,
        date:month+'-01',
        category:'人件費',
        memo:name+' 給与',
        amount:pay+tr,
        source:'salary_app'
      });
    });
    await setDoc(profRef,profDb);
    showToast(formatMonth(month)+'の給与データを収支分析に連携しました');
  }catch(e){alert('連携失敗: '+e.message);}
}

/* ---- SALARY CALC ---- */
function getStaffSetting(name){
  const def={type:'歩合',rate:20,minAmount:10000,hourlyRate:1400,trainingRate:0,trainingDayRate:8000,isTraining:false,employment:'外部委託',bankName:'',bankBranch:'',bankType:'普通',bankNo:'',bankHolder:'',fixedItems:[]};
  return Object.assign({},def,salaryDb.staffSettings[name]||{});
}

function calcPay(record){
  const s=getStaffSetting(record.staffName);
  // 研修中の日は研修日給を使用
  if(record.trainingDay&&s.isTraining){
    return Number(s.trainingDayRate)||8000;
  }
  const type=s.type||'歩合';
  const sales=Number(record.salesAmount)||0;
  const rate=(Number(s.rate)||20)/100;
  const min=Number(s.minAmount)||10000;
  const hourly=Number(s.hourlyRate)||1400;
  if(type==='歩合')return Math.round(sales*rate);
  if(type==='最低保証')return Math.max(Math.round(sales*rate),min);
  if(type==='時給'){const h=parseWorkHours(record.workHours);return Math.round(h*hourly);}
  return 0;
}

function getEffectivePay(record){
  // manualPayが設定されていれば手動値を使用
  if(record.manualPay!==undefined&&record.manualPay!==null&&record.manualPay!=='')
    return Number(record.manualPay);
  return calcPay(record);
}
function getExtrasTotal(record){
  return (record.extras||[]).reduce((s,e)=>s+Number(e.amount||0),0);
}
function getTotalPay(record){
  return getEffectivePay(record)+getExtrasTotal(record);
}

function parseWorkHours(str){
  if(!str||str==='-'||str==='')return 0;
  const s=String(str).trim();
  const m=s.match(/^(\d+):(\d+)$/);
  if(m){return parseInt(m[1])+Math.floor(parseInt(m[2])/15)*15/60;}
  const h=parseFloat(s);
  if(!isNaN(h)&&h>0){const t=Math.round(h*60);return Math.floor(t/15)*15/60;}
  return 0;
}

function formatMoney(n){return '¥'+(Math.round(n)||0).toLocaleString();}
function formatMonth(m){
  if(!m)return '';
  const p=m.match(/^(\d{4})[\/\-](\d{1,2})$/);
  if(p)return p[1]+'年'+String(p[2]).padStart(2,'0')+'月';
  return m;
}
function toISO(s){
  if(!s)return '';
  const m=s.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m)return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  return s;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ---- PAGE ROUTER ---- */
const PAGE_TITLES={dashboard:'ダッシュボード',salary:'給与計算',staff:'スタッフ設定',documents:'請求書・明細',history:'履歴・集計',records:'全勤務履歴',export:'収支連携',company:'会社情報'};

function showPage(page){
  currentPage=page;
  document.getElementById('page-title').textContent=PAGE_TITLES[page]||page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
  const c=document.getElementById('content');
  c.innerHTML='';
  if(pages[page])pages[page](c);
}
document.getElementById('sidebar-nav').addEventListener('click',e=>{
  const item=e.target.closest('.nav-item');
  if(item)showPage(item.dataset.page);
});
document.getElementById('save-btn').addEventListener('click',saveSalaryData);
document.getElementById('backup-btn').addEventListener('click',()=>{
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(salaryDb,null,2)],{type:'application/json'}));
  a.download='salary_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
});
document.getElementById('restore-btn').addEventListener('click',()=>{
  document.getElementById('restore-file').click();
});
document.getElementById('restore-file').addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!confirm('現在のデータをJSONファイルで上書きします。よろしいですか？'))return;
      salaryDb=Object.assign(defaultSalaryDb(),data);
      saveSalaryData();
      showToast('復元しました');
      showPage(currentPage);
    }catch(e){showToast('復元失敗: '+e.message,true);}
  };
  reader.readAsText(file);
  e.target.value='';
});

const pages={};

/* ========================
   DASHBOARD
======================== */
pages.dashboard=function(el){
  const months=[...new Set(salaryDb.records.map(r=>r.month))].sort().reverse();

// CSV処理
window.handleCsvDrop=function(e){
  e.preventDefault();
  document.getElementById('csv-drop-zone').style.borderColor='var(--border)';
  if(e.dataTransfer.files[0])processCsvFile(e.dataTransfer.files[0]);
};
window.handleCsvFile=function(e){if(e.target.files[0])processCsvFile(e.target.files[0]);};

function processCsvFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      let text=ev.target.result;
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
      const rows=parseCSV(text);
      // ヘッダー行スキップ・月合計行除外
      const dataRows=rows.filter((r,i)=>i>0&&r[0]&&!r[0].includes('月合計')&&r[0].trim());
      if(!dataRows.length){alert('有効なデータが見つかりません');return;}
      const month=dataRows[0][1].slice(0,7);
      const pending=dataRows.map(r=>csvRowToRecord(r,month));
      const existing=salaryDb.records.filter(r=>r.month===month).length;

      const prev=document.getElementById('csv-preview-area');
      prev.innerHTML=`
        <div class="alert alert-success">📅 ${formatMonth(month)} — ${pending.length}件 検出</div>
        ${existing?`<div class="alert alert-warn">⚠️ この月のデータが既に${existing}件あります。</div>`:''}
        <div class="btn-group mb12">
          <button class="btn btn-primary" id="csv-add-btn">✅ 追加インポート</button>
          ${existing?`<button class="btn btn-amber" id="csv-overwrite-btn">🔄 上書きインポート</button>`:''}
          <button class="btn btn-outline" onclick="document.getElementById('csv-preview-area').innerHTML=''">キャンセル</button>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>スタッフ</th><th>日付</th><th>場所</th><th class="tr">売上</th><th class="tr">交通費</th><th>給与タイプ</th><th class="tr">計算給与</th></tr></thead>
          <tbody>${pending.map(r=>{
            const ss=getStaffSetting(r.staffName);
            const pay=calcPay(r);
            const cls=ss.isTraining?'badge-training':'badge-green';
            return `<tr><td>${esc(r.staffName)}</td><td>${r.date}</td><td>${esc(r.location)}</td><td class="tr">${formatMoney(r.salesAmount)}</td><td class="tr">${formatMoney(r.transport)}</td><td><span class="badge ${cls}">${ss.isTraining?'研修中':ss.type||'歩合'}</span></td><td class="tr bold">${formatMoney(pay)}</td></tr>`;
          }).join('')}</tbody>
        </table></div>`;

      window._pendingCsvRecs=pending;
      window._pendingCsvMonth=month;
      prev.querySelector('#csv-add-btn').addEventListener('click',()=>doCsvImport(false));
      const owBtn=prev.querySelector('#csv-overwrite-btn');
      if(owBtn)owBtn.addEventListener('click',()=>doCsvImport(true));
    }catch(e){alert('CSV読み込み失敗: '+e.message);}
  };
  reader.readAsText(file,'UTF-8');
}

function parseCSV(text){
  const rows=[];
  let i=0,lineStart=0;
  const addLine=s=>{
    const line=s.trim();
    if(!line)return;
    const cells=[];let inQ=false,cell='';
    for(let j=0;j<line.length;j++){
      const c=line[j];
      if(c==='"'){inQ=!inQ;continue;}
      if(c===','&&!inQ){cells.push(cell);cell='';continue;}
      cell+=c;
    }
    cells.push(cell);rows.push(cells);
  };
  const CR=String.fromCharCode(13),LF=String.fromCharCode(10);
  while(i<text.length){
    if(text[i]===CR&&text[i+1]===LF){addLine(text.slice(lineStart,i));i+=2;lineStart=i;}
    else if(text[i]===CR||text[i]===LF){addLine(text.slice(lineStart,i));i++;lineStart=i;}
    else i++;
  }
  if(lineStart<text.length)addLine(text.slice(lineStart));
  return rows;
}

function csvRowToRecord(r,month){
  // 列: スタッフ,日付,販売場所,売上高,勤務時間,日給,交通費,合計,通勤経路,歩合率,最低保証額,時給,アラート
  const isoDate=toISO((r[1]||'').trim());
  return{
    id:salaryDb.nextId++,
    month:isoDate.slice(0,7)||month,
    staffName:(r[0]||'').trim(),
    date:isoDate,
    location:(r[2]||'').trim(),
    salesAmount:Number((r[3]||'0').replace(/,/g,'')),
    workHours:(r[4]||'').trim(),
    transport:Number((r[6]||'0').replace(/,/g,'')),
    route:(r[8]||'').trim(),
    memo:'',
    trainingDay:false,
    manualPay:undefined
  };
}

function doCsvImport(overwrite){
  const recs=window._pendingCsvRecs||[];
  const month=window._pendingCsvMonth||'';
  if(!recs.length)return;
  if(overwrite)salaryDb.records=salaryDb.records.filter(r=>r.month!==month);
  salaryDb.records.push(...recs);
  saveSalaryData();showToast(recs.length+'件をインポートしました');showPage('salary');
}

function renderSalaryTable(month){
  const tbl=document.getElementById('salary-table');
  if(!tbl)return;
  const recs=salaryDb.records.filter(r=>r.month===month);
  if(!recs.length){tbl.innerHTML='<p class="muted" style="padding:20px;text-align:center;">データがありません</p>';return;}

  const totalPay=recs.reduce((s,r)=>s+getTotalPay(r),0);
  const totalTr=recs.reduce((s,r)=>s+(Number(r.transport)||0),0);
  const mExtras=(salaryDb.monthlyExtras||[]).filter(e=>e.month===month);
  const mExtrasTotal=mExtras.reduce((s,e)=>s+Number(e.amount||0),0);

  tbl.innerHTML=`
    <div class="alert alert-info mb8" style="font-size:11px;">💡 給与額のセルを直接クリックして手動修正できます。</div>
    <div class="table-wrap"><table>

      <tbody>${recs.map(r=>{
        const calcP=calcPay(r);
        const effectiveP=getEffectivePay(r);
        const isManual=(r.manualPay!==undefined&&r.manualPay!==null&&r.manualPay!=='');
        const ss=getStaffSetting(r.staffName);
        const trDay=r.trainingDay&&ss.isTraining;
        return `<tr data-id="${r.id}">
          <td><strong>${esc(r.staffName)}</strong>${trDay?'<span class="badge badge-training" style="margin-left:4px;">研修</span>':''}</td>
          <td>${r.date}</td><td>${esc(r.location||'')}</td>
          <td class="tr">${formatMoney(r.salesAmount)}</td>
          <td>${r.workHours||'-'}</td>
          <td class="tr">${formatMoney(r.transport)}</td>
          <td class="tr muted">${isManual?`<span style="text-decoration:line-through;">${formatMoney(calcP)}</span>`:formatMoney(calcP)}</td>
          <td class="tr"><input class="edit-input manual-pay-input" data-id="${r.id}" type="number" value="${effectiveP}" title="クリックして手動修正（空欄=自動計算）" style="width:90px;${isManual?'color:var(--amber);font-weight:700;':''}"/></td>
          <td class="tr"><button class="btn btn-outline btn-sm extras-btn" data-id="${r.id}" style="font-size:10px;">${(r.extras&&r.extras.length)?formatMoney(getExtrasTotal(r))+'✏️':'＋手当'}</button></td>
          <td class="tr bold">${formatMoney(getTotalPay(r)+(Number(r.transport)||0))}</td>
          <td>
            <button class="btn btn-outline btn-sm rec-edit-btn" data-id="${r.id}">編集</button>
            <button class="btn btn-red btn-sm rec-del-btn" data-id="${r.id}" style="margin-left:4px;">削除</button>
          </td>
        </tr>`;
      }).join('')}
      </tbody>
      <tfoot><tr><td colspan="9" class="bold">合計</td><td class="tr bold">${formatMoney(recs.reduce((s,r)=>s+getTotalPay(r)+(Number(r.transport)||0),0))}</td><td></td></tr></tfoot>
    </table></div>
    ${mExtras.length?`
    <div class="mt12">
      <div class="card-title">📋 手当・立替</div>
      <div class="table-wrap"><table>
        <thead><tr><th>スタッフ</th><th>日付</th><th>内容</th><th class="tr">金額</th><th>操作</th></tr></thead>
        <tbody>${mExtras.map(e=>`<tr>
          <td><strong>${esc(e.staffName)}</strong></td>
          <td>${e.date||'-'}</td>
          <td>${esc(e.memo||'')}</td>
          <td class="tr bold">${formatMoney(e.amount)}</td>
          <td><button class="btn btn-red btn-sm me-del-btn" data-id="${e.id}">削除</button></td>
        </tr>`).join('')}</tbody>
        <tfoot><tr><td colspan="3" class="bold">小計</td><td class="tr bold">${formatMoney(mExtrasTotal)}</td><td></td></tr></tfoot>
      </table></div>
    </div>`:''}

    `;

  // 手動給与修正
  tbl.querySelectorAll('.manual-pay-input').forEach(inp=>{
    inp.addEventListener('change',()=>{
      const id=Number(inp.dataset.id);
      const rec=salaryDb.records.find(r=>r.id===id);
      if(!rec)return;
      const v=inp.value.trim();
      rec.manualPay=(v==='')?undefined:Number(v);
      saveSalaryData();
      // スタイル更新
      inp.style.color=(v==='')?'':'var(--amber)';
      inp.style.fontWeight=(v==='')?'':'700';
    });
    // フォーカス時に自動計算値を表示
    inp.addEventListener('focus',()=>{
      const id=Number(inp.dataset.id);
      const rec=salaryDb.records.find(r=>r.id===id);
      if(rec&&(rec.manualPay===undefined||rec.manualPay===null||rec.manualPay===''))
        inp.value=calcPay(rec);
    });
  });
  tbl.querySelectorAll('.me-del-btn').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('削除しますか？'))return;
    salaryDb.monthlyExtras=salaryDb.monthlyExtras.filter(e=>e.id!==Number(b.dataset.id));
    saveSalaryData();renderSalaryTable(month);
  }));
  tbl.querySelectorAll('.extras-btn').forEach(b=>b.addEventListener('click',()=>editExtras(Number(b.dataset.id),month)));
  tbl.querySelectorAll('.rec-edit-btn').forEach(b=>b.addEventListener('click',()=>editRecord(Number(b.dataset.id))));

function editExtras(id, month){
  const r=salaryDb.records.find(x=>x.id===id);
  if(!r)return;
  if(!r.extras)r.extras=[];
  const renderExtras=()=>{
    document.getElementById('extras-list').innerHTML=r.extras.map((e,i)=>`
      <div class="flex gap8 items-c mb8">
        <input class="form-control" style="flex:1;" placeholder="内容（例: 特別手当、立替金）" value="${esc(e.memo||'')}" onchange="tempExtras[${i}].memo=this.value"/>
        <input class="form-control" style="width:110px;" type="number" placeholder="金額" value="${e.amount||0}" onchange="tempExtras[${i}].amount=+this.value"/>
        <button class="btn btn-red btn-sm" onclick="tempExtras.splice(${i},1);window._refreshExtras()">削除</button>
      </div>`).join('');
  };
  window.tempExtras=JSON.parse(JSON.stringify(r.extras));
  window._refreshExtras=()=>{
    r.extras=JSON.parse(JSON.stringify(window.tempExtras));
    renderExtras();
  };
  document.getElementById('modal-title').textContent='手当・立替金入力 — '+r.staffName+' '+r.date;
  document.getElementById('modal-body').innerHTML=`
    <div class="alert alert-info mb12" style="font-size:11px;">特別手当・立替金・交通費追加分などを入力してください。給与に加算されます。</div>
    <div id="extras-list"></div>
    <button class="btn btn-outline btn-sm mt8" onclick="tempExtras.push({memo:'',amount:0});window._refreshExtras()">＋ 項目を追加</button>`;
  document.getElementById('modal-footer').innerHTML=
    '<button class="btn btn-primary" id="save-extras-btn">保存</button><button class="btn btn-outline" onclick="closeModal()">キャンセル</button>';
  document.getElementById('modal').style.display='flex';
  renderExtras();
  document.getElementById('save-extras-btn').addEventListener('click',()=>{
    const idx=salaryDb.records.findIndex(x=>x.id===id);
    if(idx===-1)return;
    salaryDb.records[idx].extras=window.tempExtras.filter(e=>e.memo||e.amount);
    closeModal();saveSalaryData();renderSalaryTable(month);
  });
}

      <div class="flex gap8">

          <input type="radio" name="eo-type" value="monthly" checked onchange="document.getElementById('eo-date-wrap').style.display='none'"/>
          <span>📋 日付なし<br><span style="font-size:10px;color:var(--text3);">月単位の手当・立替</span></span>
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 12px;border:1px solid var(--border);border-radius:8px;flex:1;">
          <input type="radio" name="eo-type" value="daily" onchange="document.getElementById('eo-date-wrap').style.display='block'"/>
          <span>📅 日付あり<br><span style="font-size:10px;color:var(--text3);">特定日の立替など</span></span>
        </label>
      </div>
    </div>
    <div id="eo-date-wrap" style="display:none;" class="form-group"><label class="form-label">日付</label>
      <input class="form-control" type="date" id="eo-date" value="${month?month+'-01':''}"/></div>
    <div id="eo-extras-list"></div>
    <button class="btn btn-outline btn-sm mt8" id="eo-add-item-btn">＋ 項目を追加</button>`;
  document.getElementById('modal-footer').innerHTML=
    '<button class="btn btn-primary" id="save-eo-btn">追加</button><button class="btn btn-outline" onclick="closeModal()">キャンセル</button>';
  document.getElementById('modal').style.display='flex';

  let eoExtras=[{memo:'',amount:0}];
  const renderEoExtras=()=>{
    document.getElementById('eo-extras-list').innerHTML=eoExtras.map((e,i)=>`
      <div class="flex gap8 items-c mb8">
        <input class="form-control" style="flex:1;" placeholder="内容（例: 立替金、特別手当）" value="${esc(e.memo||'')}" onchange="window._eoExtras[${i}].memo=this.value"/>
        <input class="form-control" style="width:110px;" type="number" placeholder="金額" value="${e.amount||0}" onchange="window._eoExtras[${i}].amount=+this.value"/>
        <button class="btn btn-red btn-sm" onclick="window._eoExtras.splice(${i},1);window._renderEoExtras()">削除</button>
      </div>`).join('');
  };
  window._eoExtras=eoExtras;
  window._renderEoExtras=renderEoExtras;
  renderEoExtras();

  document.getElementById('eo-add-item-btn').addEventListener('click',()=>{
    window._eoExtras.push({memo:'',amount:0});
    window._renderEoExtras();
  });

  document.getElementById('save-eo-btn').addEventListener('click',()=>{
    const staffName=document.getElementById('eo-staff').value;
    const type=document.querySelector('input[name="eo-type"]:checked').value;
    const date=document.getElementById('eo-date')?.value||'';
    if(!staffName){alert('スタッフを選択してください');return;}
    if(type==='daily'&&!date){alert('日付を入力してください');return;}
    const validExtras=window._eoExtras.filter(e=>e.amount);
    if(!validExtras.length){alert('金額を入力してください');return;}

    if(!salaryDb.monthlyExtras)salaryDb.monthlyExtras=[];
    if(type==='monthly'){
      // 日付なし → monthlyExtrasに追加
      validExtras.forEach(e=>{
        salaryDb.monthlyExtras.push({id:salaryDb.nextId++,month,staffName,memo:e.memo,amount:e.amount,date:''});
      });
    } else {
      // 日付あり → monthlyExtrasに日付付きで追加（空白行を作らない）
      validExtras.forEach(e=>{
        salaryDb.monthlyExtras.push({id:salaryDb.nextId++,month,staffName,memo:e.memo,amount:e.amount,date});
      });
    }
    closeModal();saveSalaryData();renderSalaryTable(month);
  });
}

window.setSS=function(name,key,val){
  if(!salaryDb.staffSettings[name])salaryDb.staffSettings[name]={};
  salaryDb.staffSettings[name][key]=val;
  saveSalaryData();
};
window.renameStaff=function(oldName,newName,inp){
  newName=newName.trim();
  if(!newName){inp.value=oldName;return;}
  if(newName===oldName)return;
  if(salaryDb.staffSettings[newName]){alert('既に存在します');inp.value=oldName;return;}
  if(salaryDb.staffSettings[oldName]){salaryDb.staffSettings[newName]=salaryDb.staffSettings[oldName];delete salaryDb.staffSettings[oldName];}
  salaryDb.records.forEach(r=>{if(r.staffName===oldName)r.staffName=newName;});
  inp.dataset.oldname=newName;
  saveSalaryData();showToast(oldName+' → '+newName);
};

window.updateDocStaff=function(presetName){

  const el=document.getElementById('doc-staff-list');

    const label=ss.type==='時給'?'給与明細':'請求書';

      <span>${esc(name)}</span><span class="badge ${cls}">${label}</span></label>`;

};

function generateAutoDoc(){
  const month=document.getElementById('doc-month').value;
  const payDate=document.getElementById('doc-paydate').value;
  const checked=[...document.querySelectorAll('input[name="doc-staff-cb"]:checked')].map(cb=>cb.value);
  if(!checked.length){alert('スタッフを選択してください');return;}
  generateDocFor(checked[0],month,payDate,getDocType(checked[0]));
}
function generateAllDocs(){
  const month=document.getElementById('doc-month').value;
  const payDate=document.getElementById('doc-paydate').value;
  const checked=[...document.querySelectorAll('input[name="doc-staff-cb"]:checked')].map(cb=>cb.value);
  if(!checked.length){alert('スタッフを選択してください');return;}
  const html=checked.map(name=>{
    const recs=salaryDb.records.filter(r=>r.month===month&&r.staffName===name);
    return recs.length?buildDocHtml(name,month,payDate,getDocType(name),recs):'';
  }).join('<div style="page-break-after:always;height:20px;"></div>');
  document.getElementById('doc-area').innerHTML=html+
    '<div class="btn-group mt12 no-print" style="max-width:780px;margin:12px auto 0;">'+
    '<button class="btn btn-primary btn-lg" onclick="window.print()">🖨️ 請求書印刷</button>'+'<button class="btn btn-amber btn-lg" onclick="printDetailOnly()">📋 明細のみ印刷</button>'+
    '<button class="btn btn-outline" onclick="document.getElementById(\'doc-area\').innerHTML=\'\'">閉じる</button></div>';
}
function getDocType(name){
  const ss=getStaffSetting(name);
  if(ss.type==='時給')return 'payslip';
  return (ss.employment==='外部委託'||!ss.employment)?'invoice':'payslip';
}
function generateDocFor(name,month,payDate,type){
  const recs=salaryDb.records.filter(r=>r.month===month&&r.staffName===name);
  if(!recs.length){alert('データが見つかりません');return;}
  document.getElementById('doc-area').innerHTML=
    buildDocHtml(name,month,payDate,type,recs)+
    '<div class="btn-group mt12 no-print" style="max-width:780px;margin:12px auto 0;">'+
    '<button class="btn btn-primary btn-lg" onclick="window.print()">🖨️ 請求書印刷</button>'+'<button class="btn btn-amber btn-lg" onclick="printDetailOnly()">📋 明細のみ印刷</button>'+
    '<button class="btn btn-outline" onclick="document.getElementById(\'doc-area\').innerHTML=\'\'">閉じる</button></div>';
}
function buildDocHtml(staffName,month,payDate,type,recs){
  const ss=getStaffSetting(staffName);
  const c=salaryDb.company||{};
  const monthStr=formatMonth(month);
  const totalPay=recs.reduce((s,r)=>s+getTotalPay(r),0);
  const totalTr=recs.reduce((s,r)=>s+(Number(r.transport)||0),0);
  const totalAmt=totalPay+totalTr;
  // 手当・立替の集計（日付あり＋日付なし）
  const allExtras=recs.flatMap(r=>(r.extras||[]).filter(e=>e.amount));
  const mExtrasForDoc=(salaryDb.monthlyExtras||[]).filter(e=>e.month===month&&e.staffName===staffName);
  const extrasTotal=allExtras.reduce((s,e)=>s+Number(e.amount||0),0);
  const mExtrasForDocTotal=mExtrasForDoc.reduce((s,e)=>s+Number(e.amount||0),0);
  const grandTotal=totalAmt+extrasTotal+mExtrasForDocTotal;
  const detailRows=recs.map(r=>{
    const pay=getEffectivePay(r);
    const tr2=Number(r.transport)||0;
    const ss2=getStaffSetting(r.staffName);
    const isTrainingDay=r.trainingDay&&ss2.isTraining;
    return `<tr><td>${r.date}</td><td>${r.location||''}</td><td style="text-align:right;">${r.workHours||'-'}</td><td style="text-align:right;">${formatMoney(r.salesAmount)}</td><td style="text-align:right;">${formatMoney(pay)}${isTrainingDay?'<span style="font-size:9px;color:#6B2FA0;"> (研修)</span>':''}</td><td style="text-align:right;">${formatMoney(tr2)}</td></tr>`;
  }).join('');
  const extrasRows=[...allExtras,...mExtrasForDoc].map(e=>`<tr><td colspan="4" style="padding:5px 7px;border:1px solid #ddd;">${esc(e.memo||'手当')}</td><td style="padding:5px 7px;border:1px solid #ddd;text-align:right;">${formatMoney(e.amount)}</td><td style="padding:5px 7px;border:1px solid #ddd;"></td></tr>`).join('');
  const detailTable=`<table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;">
    <thead><tr style="background:#f5f5f5;">${['日付','場所','時間','売上','給与','交通費'].map(h=>`<th style="padding:5px 7px;border:1px solid #ddd;text-align:left;">${h}</th>`).join('')}</tr></thead>
    <tbody>${detailRows}${extrasRows}</tbody>
    <tfoot><tr style="font-weight:700;"><td colspan="4" style="padding:5px 7px;border:1px solid #ddd;">合計（${recs.length}日）</td><td style="padding:5px 7px;border:1px solid #ddd;text-align:right;">${formatMoney(totalPay+extrasTotal+mExtrasForDocTotal)}</td><td style="padding:5px 7px;border:1px solid #ddd;text-align:right;">${formatMoney(totalTr)}</td></tr></tfoot>
  </table>`;
  if(type==='invoice'){
    return `<div style="max-width:780px;margin:0 auto;padding:24px;background:white;border:1px solid #ddd;font-family:'Noto Sans JP',sans-serif;">
      <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
        <div><h2 style="font-size:22px;margin-bottom:4px;">請 求 書</h2><div style="font-size:11px;color:#666;">${c.name||''} 御中</div></div>
        <div style="text-align:right;font-size:11px;color:#555;">${c.name||''}<br>${c.address||''}<br>${c.tel||''}<br>${c.invoiceNo?'登録番号: '+c.invoiceNo:''}</div>
      </div>
      <div style="font-size:13px;margin-bottom:16px;"><strong>${staffName}</strong>　${monthStr}分　請求金額: <strong style="font-size:18px;">${formatMoney(grandTotal)}</strong></div>
      ${payDate?`<div style="font-size:12px;color:#555;margin-bottom:12px;">支払期日: ${payDate}　振込先: ${ss.bankName||''} ${ss.bankBranch||''} ${ss.bankType||''} ${ss.bankNo||''} ${ss.bankHolder||''}</div>`:''}
      ${detailTable}</div>`;
  }else{
    return `<div style="max-width:780px;margin:0 auto;padding:20px;background:white;border:1px solid #ddd;font-family:'Noto Sans JP',sans-serif;">
      <div style="display:flex;justify-content:space-between;margin-bottom:14px;align-items:flex-end;">
        <div><div style="font-size:16px;font-weight:700;">${staffName}</div><div style="font-size:11px;color:#555;">${monthStr}分　給与支払明細</div></div>
        <div style="font-size:17px;font-weight:700;">合計: ${formatMoney(grandTotal)}</div>
      </div>
      ${detailTable}</div>`;
  }
}

  });
  el.innerHTML=`
    <div class="card">
      <div class="card-title">月別給与合計</div>
      <div class="table-wrap"><table>
        <thead><tr><th>月</th><th class="tr">給与合計</th><th class="tr">交通費</th><th class="tr">支給総額</th></tr></thead>
        <tbody>${monthData.map(m=>`<tr><td><strong>${formatMonth(m.month)}</strong></td><td class="tr">${formatMoney(m.pay)}</td><td class="tr">${formatMoney(m.tr)}</td><td class="tr bold">${formatMoney(m.total)}</td></tr>`).join('')}</tbody>
      </table></div>
    </div>
    <div class="card">
      <div class="card-title">スタッフ別集計</div>
      <select class="form-control mb12" style="width:160px;" id="hist-m" onchange="renderStaffHist(this.value)">
        <option value="">全期間</option>
        ${months.map(m=>`<option value="${m}">${formatMonth(m)}</option>`).join('')}
      </select>
      <div id="staff-hist"></div>
    </div>`;
  renderStaffHist('');
};
function renderStaffHist(month){
  const recs=month?salaryDb.records.filter(r=>r.month===month):salaryDb.records;
  const names=[...new Set(recs.map(r=>r.staffName))];
  const el=document.getElementById('staff-hist');if(!el)return;
  el.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>スタッフ</th><th>タイプ</th><th class="tr">出勤日数</th><th class="tr">売上合計</th><th class="tr">給与合計</th><th class="tr">交通費</th><th class="tr">支給総額</th></tr></thead>
    <tbody>${names.map(name=>{
      const sr=recs.filter(r=>r.staffName===name);
      const pay=sr.reduce((s,r)=>s+getEffectivePay(r),0);
      const tr=sr.reduce((s,r)=>s+(Number(r.transport)||0),0);
      const sales=sr.reduce((s,r)=>s+(Number(r.salesAmount)||0),0);
      const ss=getStaffSetting(name);
      const cls=ss.isTraining?'badge-training':'badge-green';
      return `<tr><td><strong>${esc(name)}</strong></td><td><span class="badge ${cls}">${ss.isTraining?'研修中':ss.type||'歩合'}</span></td><td class="tr">${sr.length}日</td><td class="tr">${formatMoney(sales)}</td><td class="tr bold">${formatMoney(pay)}</td><td class="tr">${formatMoney(tr)}</td><td class="tr bold">${formatMoney(pay+tr)}</td></tr>`;
    }).join('')}</tbody>
  </table></div>`;
}
window.renderStaffHist=renderStaffHist;

/* ========================

pages.records=function(el){
  const months=[...new Set(salaryDb.records.map(r=>r.month))].sort().reverse();
  const staffNames=[...new Set(salaryDb.records.map(r=>r.staffName))].sort();

  el.innerHTML=`
    <div class="card no-print">
      <div class="card-title">絞り込み</div>
      <div class="flex gap8 items-c flex-wrap">
        <select class="form-control" style="width:160px;" id="rec-month-filter">
          <option value="">全月</option>
          ${months.map(m=>`<option value="${m}">${formatMonth(m)}</option>`).join('')}
        </select>
        <select class="form-control" style="width:140px;" id="rec-staff-filter">
          <option value="">全スタッフ</option>
          ${staffNames.map(n=>`<option value="${esc(n)}">${esc(n)}</option>`).join('')}
        </select>
        <input class="form-control" style="width:160px;" id="rec-loc-filter" placeholder="場所で検索"/>
        <button class="btn btn-primary" id="rec-search-btn">🔍 絞り込み</button>
        <button class="btn btn-outline" id="rec-reset-btn">リセット</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">勤務履歴一覧 <span id="rec-count" class="muted"></span></div>
      <div id="rec-table"></div>
    </div>`;

  function renderRecords(){
    const mf=document.getElementById('rec-month-filter').value;
    const sf=document.getElementById('rec-staff-filter').value;
    const lf=document.getElementById('rec-loc-filter').value.trim();
    let recs=[...salaryDb.records];
    if(mf)recs=recs.filter(r=>r.month===mf);
    if(sf)recs=recs.filter(r=>r.staffName===sf);
    if(lf)recs=recs.filter(r=>(r.location||'').includes(lf));
    recs.sort((a,b)=>a.date<b.date?1:-1);

    const totalPay=recs.reduce((s,r)=>s+getTotalPay(r),0);
    const totalTr=recs.reduce((s,r)=>s+(Number(r.transport)||0),0);
    const totalSales=recs.reduce((s,r)=>s+(Number(r.salesAmount)||0),0);

    document.getElementById('rec-count').textContent=recs.length+'件';
    const tbl=document.getElementById('rec-table');
    tbl.innerHTML=recs.length?`
      <div class="table-wrap">
        <table>
          <thead><tr><th>月</th><th>日付</th><th>スタッフ</th><th>場所</th><th class="tr">売上</th><th class="tr">交通費</th><th class="tr">給与</th><th>備考</th></tr></thead>
          <tbody>${recs.map(r=>`<tr>
            <td><span class="badge badge-gray">${formatMonth(r.month)}</span></td>
            <td>${r.date}</td>
            <td><strong>${esc(r.staffName)}</strong></td>
            <td>${esc(r.location||'')}</td>
            <td class="tr">${formatMoney(r.salesAmount)}</td>
            <td class="tr">${formatMoney(Number(r.transport)||0)}</td>
            <td class="tr bold">${formatMoney(getEffectivePay(r))}</td>
            <td class="muted">${esc(r.memo||'')}</td>
          </tr>`).join('')}</tbody>
          <tfoot><tr>
            <td colspan="4" class="bold">合計 ${recs.length}件</td>
            <td class="tr bold">${formatMoney(totalSales)}</td>
            <td class="tr bold">${formatMoney(totalTr)}</td>
            <td class="tr bold">${formatMoney(totalPay)}</td>
            <td></td>
          </tr></tfoot>
        </table>
      </div>`:'<p class="muted" style="padding:20px;text-align:center;">データがありません</p>';
  }

  renderRecords();
  el.querySelector('#rec-search-btn').addEventListener('click',renderRecords);
  el.querySelector('#rec-reset-btn').addEventListener('click',()=>{
    document.getElementById('rec-month-filter').value='';
    document.getElementById('rec-staff-filter').value='';
    document.getElementById('rec-loc-filter').value='';
    renderRecords();
  });
};

pages.export=function(el){
  const months=[...new Set(salaryDb.records.map(r=>r.month))].sort().reverse();
  el.innerHTML=`
    <div class="card">
      <div class="card-title">収支分析へ連携</div>
      <div class="alert alert-info mb12">計算した給与データを収支分析アプリの「人件費」として自動登録します。同月のデータは上書きされます。</div>
      ${months.length?`
        <div class="flex gap8 items-c mb12">
          <select class="form-control" style="width:160px;" id="export-month">
            ${months.map(m=>`<option value="${m}">${formatMonth(m)}</option>`).join('')}
          </select>
          <button class="btn btn-primary" id="do-export-btn">📤 収支分析へ連携する</button>
        </div>
        <div id="export-preview"></div>`
      :`<p class="muted">給与データがありません</p>`}
    </div>`;

  const exportBtn=el.querySelector('#do-export-btn');
  if(exportBtn){
    const updatePreview=()=>{
      const m=el.querySelector('#export-month').value;
      const recs=salaryDb.records.filter(r=>r.month===m);
      const staffList=[...new Set(recs.map(r=>r.staffName))];
      const prev=el.querySelector('#export-preview');
      if(!prev)return;
      prev.innerHTML=`<div class="table-wrap"><table>
        <thead><tr><th>スタッフ</th><th class="tr">給与</th><th class="tr">交通費</th><th class="tr">合計</th></tr></thead>
        <tbody>${staffList.map(name=>{
          const sr=recs.filter(r=>r.staffName===name);
          const pay=sr.reduce((s,r)=>s+getEffectivePay(r),0);
          const tr=sr.reduce((s,r)=>s+(Number(r.transport)||0),0);
          return `<tr><td>${esc(name)}</td><td class="tr">${formatMoney(pay)}</td><td class="tr">${formatMoney(tr)}</td><td class="tr bold">${formatMoney(pay+tr)}</td></tr>`;
        }).join('')}</tbody>
        <tfoot><tr><td class="bold">合計</td><td colspan="2"></td><td class="tr bold">${formatMoney(recs.reduce((s,r)=>s+getEffectivePay(r)+(Number(r.transport)||0),0))}</td></tr></tfoot>
      </table></div>`;
    };
    el.querySelector('#export-month').addEventListener('change',updatePreview);
    updatePreview();
    exportBtn.addEventListener('click',async()=>{
      const m=el.querySelector('#export-month').value;
      if(!confirm(formatMonth(m)+'の給与データを収支分析に連携しますか？'))return;
      await exportToProfit(m);
    });
  }
};

======================== */
window.printDetailOnly=function(){
  // 明細のみ印刷：会社情報・タイトル部分を非表示にして印刷
  const docArea=document.getElementById('doc-area');
  if(!docArea)return;
  // 明細テーブル部分のみ抽出してiframeで印刷
  const tables=docArea.querySelectorAll('table');
  if(!tables.length){window.print();return;}
  let printHtml='<html><head><meta charset="UTF-8"><style>';
  printHtml+='body{font-family:"Noto Sans JP",sans-serif;font-size:11px;margin:10mm;}';
  printHtml+='table{width:100%;border-collapse:collapse;}';
  printHtml+='th,td{padding:5px 7px;border:1px solid #ddd;text-align:left;}';
  printHtml+='th{background:#f5f5f5;font-weight:500;}';
  printHtml+='.tr{text-align:right;}';
  printHtml+='h3{font-size:13px;margin:12px 0 6px;}';
  printHtml+='</style></head><body>';
  // スタッフ名・月・金額のサマリーを追加
  const summaries=docArea.querySelectorAll('div[style*="max-width:780px"]');
  summaries.forEach(s=>{
    // 明細テーブルとサマリー行のみ
    const name=s.querySelector('[style*="font-size:16px"],[style*="font-size:13px"]');
    if(name)printHtml+=`<h3>${name.textContent}</h3>`;
    s.querySelectorAll('table').forEach(t=>{printHtml+=t.outerHTML;});
    printHtml+='<br>';
  });
  printHtml+='</body></html>';
  const iframe=document.createElement('iframe');
  iframe.style.cssText='position:fixed;top:-9999px;left:-9999px;width:0;height:0;';
  document.body.appendChild(iframe);
  iframe.contentDocument.write(printHtml);
  iframe.contentDocument.close();
  iframe.contentWindow.focus();
  iframe.contentWindow.print();
  setTimeout(()=>iframe.remove(),2000);
};

window.closeModal=function(){document.getElementById('modal').style.display='none';};
window.closeModalOuter=function(e){if(e.target===document.getElementById('modal'))closeModal();};

function showToast(msg,isErr=false){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:22px;right:22px;background:${isErr?'var(--red)':'var(--text)'};color:white;padding:11px 18px;border-radius:10px;font-size:12px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2);`;
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}
